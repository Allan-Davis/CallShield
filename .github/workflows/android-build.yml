name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Node 22 is required — package.json engines field says >= 22.11.0
      # metro-config in RN 0.85 uses Array.toReversed() which needs Node 22
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify Node version
        run: |
          echo "Node: $(node -v)"
          echo "NPM:  $(npm -v)"

      # Java 17 must be set up BEFORE npm install so native build tools align
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Dependencies
        run: npm install

      - name: Grant Gradle executable permission
        run: chmod +x android/gradlew

      # Build only for arm64-v8a to massively speed up CI (covers 95% of modern Android phones)
      # Change back to all archs for a full release by removing the -PreactNativeArchitectures line
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon \
            --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Verify APK was created
        run: |
          ls -lh android/app/build/outputs/apk/release/
          echo "APK build SUCCESS"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CallShield-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30