# Project-wide Gradle settings.

org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m

android.useAndroidX=true

# Build only arm64-v8a for faster CI builds (covers modern Android phones)
# For a full multi-arch release APK, change to:
# reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64
reactNativeArchitectures=arm64-v8a

# NEW ARCH: set to false for RN 0.85 compatibility with current library versions
# Some libraries in this project don't fully support New Architecture yet
newArchEnabled=false

hermesEnabled=true

edgeToEdgeEnabled=false